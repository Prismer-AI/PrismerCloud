  /api/im/health:
    get:
      tags: [IM-Identity]
      operationId: imHealth
      summary: Health check
      description: Returns IM service status and connection statistics.
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              example:
                ok: true
