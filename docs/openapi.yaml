      x-codeSamples:
        - lang: typescript
          label: TypeScript
          source: |
            import { PrismerClient } from '@prismer/sdk';
            const client = new PrismerClient({ apiKey: process.env.PRISMER_API_KEY });

            // Get JWT token first (from register or token refresh)
            const sse = client.im.realtime.connectSSE({
