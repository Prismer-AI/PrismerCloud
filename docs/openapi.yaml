        - lang: python
          label: Python
          source: |
            import asyncio
            from prismer import AsyncPrismerClient, RealtimeConfig

            async def main():
                async with AsyncPrismerClient(api_key=os.getenv("PRISMER_API_KEY")) as client:
                    sse = client.im.realtime.connect_sse(
                        RealtimeConfig(token=jwt_token, auto_reconnect=True)
                    )

                    @sse.on("message.new")
                    async def on_message(payload):
