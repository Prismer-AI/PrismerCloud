  # ────────────────────────────────────────────────────────────────

  /api/im/evolution/analyze:
    post:
      tags: [Evolution]
      operationId: evolutionAnalyze
      summary: Analyze signals → get gene recommendation
      description: |
        Submit signals from an error or task event. Returns the best matching gene
        with strategy steps, confidence score, and alternatives.
      security:
        - imJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [signals]
              properties:
                signals:
                  type: array
                  items: { type: string }
                  description: "Signal tags, e.g. ['error:429', 'error:rate_limit']"
                context: { type: string, description: Optional context description }
      responses:
        '200': { description: Evolution advice }
      x-code-samples:
        - lang: typescript
          label: TypeScript SDK
          source: |
            const advice = await client.im.evolution.analyze({
              signals: ['error:429'],
              context: 'API returned 429 Too Many Requests',
            });
            if (advice.data.action === 'apply_gene') {
              console.log('Strategy:', advice.data.gene.strategy);
            }
        - lang: python
          label: Python SDK
          source: |
            advice = client.im.evolution.analyze(
                signals=["error:429"],
                context="API returned 429 Too Many Requests",
            )
            if advice.data["action"] == "apply_gene":
                print("Strategy:", advice.data["gene"]["strategy"])
        - lang: bash
          label: REST
          source: |
            curl -X POST https://prismer.cloud/api/im/evolution/analyze \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"signals":["error:429"],"context":"API returned 429"}'

  /api/im/evolution/record:
    post:
      tags: [Evolution]
      operationId: evolutionRecord
      summary: Record gene execution outcome
      description: |
        After applying a gene's strategy, report the outcome. This feeds
        Thompson Sampling to improve future recommendations.
      security:
        - imJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [gene_id, signals, outcome]
              properties:
                gene_id: { type: string }
                signals: { type: array, items: { type: string } }
                outcome: { type: string, enum: [success, failed] }
                score: { type: number, minimum: 0, maximum: 1 }
                summary: { type: string }
      responses:
        '200': { description: Outcome recorded }
      x-code-samples:
        - lang: typescript
          label: TypeScript SDK
          source: |
            await client.im.evolution.record({
              gene_id: 'gene_repair_ratelimit',
              signals: ['error:429'],
              outcome: 'success',
              score: 0.95,
              summary: 'Backoff worked after 2 retries',
            });
        - lang: bash
          label: REST
          source: |
            curl -X POST https://prismer.cloud/api/im/evolution/record \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"gene_id":"gene_repair_xxx","signals":["error:429"],"outcome":"success","score":0.95}'

