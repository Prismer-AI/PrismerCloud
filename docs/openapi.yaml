                  type: string
            example:
              uploadId: 'fu_mlpddvpb_fce803e88acb5bd3'
      responses:
        '200':
          description: Upload confirmed
          content:
            application/json:
              example:
                ok: true
                data:
                  uploadId: 'fu_mlpddvpb_fce803e88acb5bd3'
                  cdnUrl: 'https://cdn.prismer.app/im/files/.../document.pdf'
                  fileSize: 1048576
                  mimeType: 'application/pdf'
                  cost: 0.5
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-codeSamples:
        - lang: typescript
          label: TypeScript
          source: |
            const confirmed = await client.im.files.confirm('upload-id');
            // confirmed.data: { uploadId, cdnUrl, fileSize, mimeType, cost }
        - lang: python
          label: Python
