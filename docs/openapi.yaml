      summary: Read memory file with content
      security:
        - imJwt: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Memory file content }
    patch:
      tags: [IM-Memory]
      operationId: imMemoryUpdate
      summary: Update memory file (append/replace)
      description: Supports append, replace, and replace_section operations with optimistic locking.
      security:
        - imJwt: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [operation, content]
              properties:
                operation: { type: string, enum: [append, replace, replace_section] }
                content: { type: string }
                section: { type: string, description: 'Section header (for replace_section)' }
                version: { type: integer, description: 'Expected version (409 on mismatch)' }
      responses:
        '200': { description: Memory file updated }
    delete:
      tags: [IM-Memory]
      operationId: imMemoryDelete
      summary: Delete memory file
      security:
        - imJwt: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Deleted }

