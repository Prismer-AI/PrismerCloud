  # ────────────────────────────────────────────────────────────────
  # Sync API (Offline-First SDK)
  # ────────────────────────────────────────────────────────────────

  /api/im/sync:
    get:
      tags: [IM-Sync]
      operationId: imSync
      summary: Incremental sync
      x-cost: 'Free'
      x-rate-limit: '60 req/min'
      x-timeout: '10s'
      description: |
        Cursor-based incremental sync endpoint for offline-first SDK clients.
        Returns events that occurred after the given cursor. Only returns events
        for conversations the authenticated user participates in.

        **Event types:**
        - `message.new` — New message sent
        - `message.edit` — Message content edited
        - `message.delete` — Message deleted
        - `conversation.create` — Direct or group conversation created
        - `conversation.update` — Conversation title/description changed
        - `conversation.archive` — Conversation archived
        - `participant.add` — Member added to conversation
        - `participant.remove` — Member removed (event written before removal so removed user sees it)

        **Sync flow:**
        1. On first connect, call with `since=0` to get initial events
        2. Store the returned `cursor` locally
        3. On reconnect or periodic poll, call with `since={cursor}`
        4. If `hasMore` is true, keep fetching with updated cursor

        **Idempotency:** Message send operations can include a `_idempotencyKey`
        in metadata or the `X-Idempotency-Key` header. The server deduplicates
        retries within 24 hours — safe for outbox-pattern offline clients.
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - name: since
          in: query
          description: Cursor — last seen event seq number. Pass 0 for initial sync.
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          description: Max events to return (1–500).
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: Sync events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IMSyncResponse'
              example:
                ok: true
                data:
                  events:
                    - seq: 42
                      type: 'message.new'
                      data:
                        id: 'cmlgdvcg4...'
                        conversationId: 'cmlgdvcf8...'
                        senderId: '6e88qiwidxg'
                        type: 'text'
                        content: 'Hello!'
                      conversationId: 'cmlgdvcf8...'
                      at: '2026-02-19T08:00:00.000Z'
                    - seq: 43
                      type: 'message.edit'
                      data:
                        id: 'cmlgdvcg4...'
                        content: 'Hello (edited)!'
                      conversationId: 'cmlgdvcf8...'
                      at: '2026-02-19T08:01:00.000Z'
                    - seq: 44
                      type: 'conversation.create'
                      data:
                        id: 'conv_abc...'
                        type: 'group'
                        title: 'Team Chat'
                        members: ['user_a', 'user_b']
                      conversationId: 'conv_abc...'
                      at: '2026-02-19T08:02:00.000Z'
                    - seq: 45
                      type: 'participant.add'
                      data:
                        conversationId: 'conv_abc...'
                        userId: 'user_c'
                        role: 'member'
                      conversationId: 'conv_abc...'
                      at: '2026-02-19T08:03:00.000Z'
                  cursor: 45
                  hasMore: false
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-codeSamples:
        - lang: typescript
          label: TypeScript
          source: |
            // Automatic sync via offline manager
            const client = new PrismerClient({
              apiKey: token,
              offline: {
                storage: new IndexedDBStorage('my-app'),
                syncOnConnect: true,
              },
            });

            // Or manual sync
            const result = await client.im.offline?.sync();
            console.log(result?.applied, 'events applied');

            // Low-level: direct API call
            const res = await fetch('/api/im/sync?since=42&limit=100', {
              headers: { Authorization: `Bearer ${token}` },
            });
            const { data } = await res.json();
            // data.events, data.cursor, data.hasMore
        - lang: python
          label: Python
          source: |
            result = client.im.sync(since=42, limit=100)
            for event in result.events:
                print(f"{event.type}: {event.data}")
            next_cursor = result.cursor
        - lang: go
          label: Go
          source: |
            result, _ := im.Sync(ctx, &prismer.SyncOptions{
              Since: 42,
              Limit: 100,
            })
            for _, event := range result.Events {
              fmt.Printf("%s: %v\n", event.Type, event.Data)
            }
        - lang: bash
          label: curl
          source: |
            curl -X GET 'https://prismer.cloud/api/im/sync?since=0&limit=100' \
              -H "Authorization: Bearer $TOKEN"

  /api/im/sync/stream:
    get:
      tags: [IM-Sync]
      operationId: imSyncStream
      summary: SSE sync stream (continuous push)
      x-rate-limit: '1 connection/user'
      x-timeout: 'long-lived SSE'
      description: |
        Server-Sent Events endpoint for continuous sync.
        Streams sync events in real-time after an initial catch-up phase.

        **Protocol:**
        1. Client opens SSE connection with JWT token and cursor
        2. Server sends all events since cursor as `event: sync` messages
        3. Server sends `event: caught_up` when historical events are exhausted
        4. Server streams new events as they occur via Redis pub/sub
        5. Heartbeat every 25s: `event: heartbeat`

        **SSE event types:**
        - `sync` — sync event data (same format as polling endpoint)
        - `caught_up` — initial catch-up complete, now in real-time mode
        - `heartbeat` — keep-alive signal

        Requires SSE support (EventSource API in browsers, or SSE client library).
        Falls back to polling endpoint (`GET /api/im/sync`) if SSE unavailable.
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: JWT authentication token
        - name: since
          in: query
          required: false
          schema:
            type: string
            default: '0'
          description: Cursor (sync event ID) to resume from
      responses:
        '200':
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  SSE format:
                  ```
                  event: sync
                  data: {"seq":1,"type":"message.new","data":{...},"conversationId":"...","at":"..."}

                  event: caught_up
                  data: {"cursor":42}

                  event: heartbeat
                  data: {"ts":"2026-02-19T10:00:00Z"}
                  ```
        '401':
          description: Unauthorized — invalid or expired JWT
      x-codeSamples:
        - lang: typescript
          label: TypeScript SDK
          source: |
            // SSE sync is automatic when syncMode is 'push' (default):
            const client = new PrismerClient({
              apiKey: token,
              offline: {
                storage: new IndexedDBStorage(),
                syncMode: 'push',  // default — uses SSE
              },
            });
            await client.initOffline();

            // Events received automatically via SSE:
            client.offline.on('sync.complete', ({ newMessages }) => {
              console.log(`${newMessages} new messages synced`);
            });
        - lang: bash
          label: curl
          source: |
            curl -N 'https://prismer.cloud/api/im/sync/stream?token=$TOKEN&since=0'

