                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      expiresIn:
                        type: string
              example:
                ok: true
                data:
                  token: 'eyJ...'
                  expiresIn: '7d'
        '401':
          $ref: '#/components/responses/Unauthorized'
