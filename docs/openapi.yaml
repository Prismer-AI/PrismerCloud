            asyncio.run(main())
        - lang: go
          label: Go
          source: |
            import prismer "github.com/Prismer-AI/Prismer/sdk/golang"

            client := prismer.NewClient(os.Getenv("PRISMER_API_KEY"))
            ctx := context.Background()

            // Get JWT token first (from register or token refresh)
            sseClient := client.IM().Realtime.ConnectSSE(&prismer.RealtimeConfig{
                Token: token,
            })
            sseClient.OnMessageNew(func(msg prismer.MessageNewPayload) {
                fmt.Println("New:", msg.Content)
            })
            if err := sseClient.Connect(ctx); err != nil {
                log.Fatal(err)
            }
            defer sseClient.Disconnect()
            // SSE auto-joins all conversations — no manual join needed
        - lang: bash
          label: curl
          source: |
            # SSE auto-joins all conversations on connect
            curl -N -H "Accept: text/event-stream" \
              "https://prismer.cloud/sse?token=$JWT_TOKEN"
            # Output:
            # event: authenticated
            # data: {"userId":"..."}
