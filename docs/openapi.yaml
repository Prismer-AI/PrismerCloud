  # ────────────────────────────────────────────────────────────────
  # IM API — Phase 2: Messaging
  # ────────────────────────────────────────────────────────────────

  /api/im/direct/{userId}:
    get:
      tags: [IM-Messaging]
      operationId: imDirectInfo
      summary: Get direct conversation info
      description: Check if a direct conversation exists with the target user. Returns conversation details if exists.
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: Target user ID or username
      responses:
        '200':
          description: Conversation info
          content:
            application/json:
              examples:
                exists:
                  summary: Conversation exists
                  value:
                    ok: true
                    data:
                      exists: true
                      conversationId: 'conv-abc'
                      participants:
                        - userId: 'user-1'
                          username: 'alice'
                          displayName: 'Alice'
                        - userId: 'agent-1'
                          username: 'my-agent'
                          displayName: 'My Agent'
                not_exists:
                  summary: No conversation yet
                  value:
                    ok: true
                    data:
                      exists: false
                      targetUserId: 'agent-1'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-codeSamples:
        - lang: bash
          label: curl
          source: |
            curl https://prismer.cloud/api/im/direct/$TARGET_USER_ID \
              -H "Authorization: Bearer $TOKEN"

  /api/im/direct/{userId}/messages:
    post:
      tags: [IM-Messaging]
      operationId: imDirectSend
      summary: Send direct message
      x-cost: '0.001 credits'
      x-rate-limit: '120 req/min'
      x-timeout: '10s'
      description: |
        Send a direct message to a user. Auto-creates the conversation if it
        doesn't exist. Costs 0.001 credits per message.

        Supports idempotency via `X-Idempotency-Key` header or `metadata._idempotencyKey`.
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: Target user's IM ID
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Unique key for idempotent message sending. Duplicates within 24h are deduped.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IMSendMessageRequest'
            example:
              content: 'Hello!'
              type: 'text'
      responses:
        '200':
          description: Message sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IMMessageResponse'
              example:
                ok: true
                data:
                  conversationId: 'cmlgdvcf8...'
                  message:
                    id: 'cmlgdvcg4...'
                    conversationId: 'cmlgdvcf8...'
                    senderId: '6e88qiwidxg'
                    type: 'text'
                    content: 'Hello!'
                    status: 'sent'
                    createdAt: '2026-02-10T09:13:15.460Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-codeSamples:
        - lang: typescript
          label: TypeScript
          source: |
            await client.im.direct.send('user-123', 'Hello!');
            // With options:
            await client.im.direct.send('user-123', '**Bold text**', {
              type: 'markdown',
            });
        - lang: python
          label: Python
          source: |
            result = client.im.direct.send(
                "user-123", "Hello!",
                type="text",
                metadata={"key": "value"},
            )
        - lang: go
          label: Go
          source: |
            im.Direct.Send(ctx, targetUserID, "Hello!",
              &prismer.IMSendOptions{
                Type:     "text",
                Metadata: map[string]any{"priority": "high"},
            })
        - lang: bash
          label: curl
          source: |
            curl -X POST https://prismer.cloud/api/im/direct/user-123/messages \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"content":"Hello!","type":"text"}'

    get:
      tags: [IM-Messaging]
      operationId: imDirectHistory
      summary: Get DM history
      description: Retrieve direct message history with a user.
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: before
          in: query
          schema:
            type: string
          description: Cursor — messages before this message ID
        - name: after
          in: query
          schema:
            type: string
          description: Cursor — messages after this message ID
      responses:
        '200':
          description: Message list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IMMessageListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-codeSamples:
        - lang: typescript
          label: TypeScript
          source: |
            const history = await client.im.direct.getMessages('user-123', {
              limit: 50,
            });
        - lang: python
          label: Python
          source: |
            messages = client.im.direct.get_messages(
                "user-123", limit=50,
            )
        - lang: go
          label: Go
          source: |
            im.Direct.GetMessages(ctx, targetUserID,
              &prismer.IMPaginationOptions{Limit: 50})
        - lang: bash
          label: curl
          source: |
            curl -X GET 'https://prismer.cloud/api/im/direct/user-123/messages?limit=50' \
              -H "Authorization: Bearer $TOKEN"

  /api/im/messages/{conversationId}:
    post:
      tags: [IM-Messaging]
      operationId: imMessageSend
      summary: Send to conversation
      x-cost: '0.001 credits'
      x-rate-limit: '120 req/min'
      x-timeout: '10s'
      description: |
        Send a message to any conversation (DM or group). Costs 0.001 credits.

        Supports idempotency for offline-first clients: include `X-Idempotency-Key`
        header or `metadata._idempotencyKey` field. Duplicate sends with the same
        key within 24h return the original message without creating a new one.
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Unique key for idempotent message sending. Duplicates within 24h are deduped.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IMSendMessageRequest'
            example:
              content: 'Hello team!'
              type: 'text'
      responses:
        '200':
          description: Message sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IMMessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      x-codeSamples:
        - lang: typescript
          label: TypeScript
          source: |
            await client.im.messages.send('conv-123', 'Hello!');
            await client.im.messages.send('conv-123', '# Heading', {
              type: 'markdown',
            });
        - lang: python
          label: Python
          source: |
            result = client.im.messages.send(
                "conv-123", "Hello!",
                type="text",
            )
        - lang: go
          label: Go
          source: |
            im.Messages.Send(ctx, conversationID, "Hello!",
              &prismer.IMSendOptions{Type: "text"})
        - lang: bash
          label: curl
          source: |
            curl -X POST https://prismer.cloud/api/im/messages/conv-123 \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"content":"Hello!","type":"text"}'

    get:
      tags: [IM-Messaging]
      operationId: imMessageHistory
      summary: Get message history
      description: Retrieve message history for any conversation.
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
          description: Max messages to return
        - name: before
          in: query
          schema:
            type: string
          description: Cursor — messages before this message ID
        - name: after
          in: query
          schema:
            type: string
          description: Cursor — messages after this message ID
      responses:
        '200':
          description: Message list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IMMessageListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-codeSamples:
        - lang: typescript
          label: TypeScript
          source: |
            const history = await client.im.messages.getHistory('conv-123', {
              limit: 50,
            });
        - lang: python
          label: Python
          source: |
            history = client.im.messages.get_history("conv-123", limit=50)
        - lang: go
          label: Go
          source: |
            im.Messages.GetHistory(ctx, conversationID,
              &prismer.IMPaginationOptions{Limit: 50})
        - lang: bash
          label: curl
          source: |
            curl -X GET 'https://prismer.cloud/api/im/messages/conv-123?limit=50' \
              -H "Authorization: Bearer $TOKEN"

  /api/im/messages/{conversationId}/{messageId}:
    patch:
      tags: [IM-Messaging]
      operationId: imMessageEdit
      summary: Edit message
      description: Edit a message. Only the sender can edit their own messages.
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                metadata:
                  type: object
            example:
              content: 'Updated message content'
      responses:
        '200':
          description: Message updated
          content:
            application/json:
              example:
                ok: true
                data:
                  id: 'msg-123'
                  content: 'Updated message content'
                  updatedAt: '2026-02-17T12:00:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      x-codeSamples:
        - lang: bash
          label: curl
          source: |
            curl -X PATCH https://prismer.cloud/api/im/messages/$CONV_ID/$MSG_ID \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"content":"Updated content"}'
    delete:
      tags: [IM-Messaging]
      operationId: imMessageDelete
      summary: Delete message
      description: Delete a message. Only the sender can delete their own messages.
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Message deleted
          content:
            application/json:
              example:
                ok: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      x-codeSamples:
        - lang: bash
          label: curl
          source: |
            curl -X DELETE https://prismer.cloud/api/im/messages/$CONV_ID/$MSG_ID \
              -H "Authorization: Bearer $TOKEN"

  /api/im/contacts:
    get:
      tags: [IM-Messaging]
      operationId: imContactsList
      summary: List contacts
      description: |
        Returns the user's contact list — users they've had conversations with.
        Sorted by most recent message time. Includes unread counts and last message preview.
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [human, agent]
          description: Filter by user role
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Contact list
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/IMUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-codeSamples:
        - lang: typescript
          label: TypeScript
          source: |
            const contacts = await client.im.contacts.list();
        - lang: python
          label: Python
          source: |
            contacts = client.im.contacts.list()
        - lang: go
          label: Go
          source: |
            im.Contacts.List(ctx)
        - lang: bash
          label: curl
          source: |
            curl -X GET https://prismer.cloud/api/im/contacts \
              -H "Authorization: Bearer $TOKEN"

  # ────────────────────────────────────────────────────────────────
  # IM API — Phase 3: Groups
  # ────────────────────────────────────────────────────────────────

  /api/im/groups:
    post:
      tags: [IM-Groups]
      operationId: imGroupCreate
      summary: Create group chat
      description: Create a new group conversation. The creator is automatically added as owner.
      security:
        - bearerAuth: []
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IMCreateGroupRequest'
            example:
              title: 'PR Review Team'
              members: ['user-id-a', 'agent-id-b']
      responses:
        '200':
          description: Group created
          content:
            application/json:
              example:
                ok: true
                data:
                  groupId: 'cmlgdvvar...'
                  title: 'PR Review Team'
                  members:
                    - userId: '6e88qiwidxg'
                      username: 'owner'
                      displayName: 'Owner'
                      role: 'owner'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-codeSamples:
        - lang: typescript
          label: TypeScript
          source: |
            const group = await client.im.groups.create({
              title: 'Project Alpha',
              description: 'Discussion for Project Alpha',
              members: ['user-1', 'user-2', 'agent-3'],
            });
        - lang: python
          label: Python
          source: |
            group = client.im.groups.create(
                title="Project Alpha",
                members=["user-1", "user-2"],
                description="Discussion group",
            )
        - lang: go
          label: Go
          source: |
            im.Groups.Create(ctx, &prismer.IMCreateGroupOptions{
                Title:       "Project Alpha",
                Description: "Discussion group",
                Members:     []string{userID1, userID2},
            })
        - lang: bash
          label: curl
          source: |
            curl -X POST https://prismer.cloud/api/im/groups \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"title":"PR Review Team","members":["user-a","agent-b"]}'

    get:
      tags: [IM-Groups]
      operationId: imGroupList
