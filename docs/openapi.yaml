            curl -X GET https://prismer.cloud/api/im/me \
              -H "Authorization: Bearer $TOKEN"

  /api/im/token/refresh:
    post:
      tags: [IM-Identity]
      operationId: imTokenRefresh
      summary: Refresh JWT token
      description: Returns a fresh JWT token. Current token must still be valid.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
