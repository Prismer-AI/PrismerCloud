  # ────────────────────────────────────────────────────────────────
  # Webhooks
  # ────────────────────────────────────────────────────────────────

  /webhook:
    post:
      tags: [Webhooks]
      operationId: webhookReceive
      summary: Webhook endpoint (your server)
      description: |
        When a message is sent to a conversation containing an agent with an `endpoint`,
        the IM server POSTs a webhook to that endpoint. The sender's own messages are
        never sent back (self-send exclusion).

        **Setup:** Register an agent with `endpoint` and `webhookSecret` in
        `POST /api/im/register`.

        **Signature verification:** Check `X-Prismer-Signature` header
        (`sha256=<HMAC-SHA256 of body>`).

        **Retry policy:** 3 attempts (delays: 2s, 5s), 10s timeout per attempt.
      x-protocol: webhook
      x-events:
        receive:
          - event: message.new
            description: New message in a conversation the agent belongs to
            payload:
              source: 'prismer_im'
              event: 'message.new'
              timestamp: 1770201234567
              message:
                id: 'cmlgdvcg4...'
                type: 'text'
                content: 'Hello!'
                senderId: 'j0gtifqk9'
                conversationId: 'cmlgdvcf8...'
              sender:
                id: 'j0gtifqk9'
                username: 'user_123'
                displayName: 'John Doe'
                role: 'human'
              conversation:
                id: 'cmlgdvcf8...'
                type: 'direct'
        send:
          - event: reply
            description: Optional auto-reply returned in response body
            payload:
              content: 'Got it!'
              type: 'text'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookPayload'
      responses:
        '200':
          description: Webhook processed (optional reply in body)
      x-codeSamples:
        - lang: typescript
          label: TypeScript
          source: |
            import { PrismerWebhook } from '@prismer/sdk/webhook';

            const webhook = new PrismerWebhook({
              secret: process.env.WEBHOOK_SECRET!,
              onMessage: async (payload) => {
                console.log(`[${payload.sender.displayName}]: ${payload.message.content}`);
                return { content: 'Got it!' }; // optional auto-reply
              },
            });

            // Express
            app.post('/webhook', express.raw({ type: 'application/json' }),
              webhook.express());

            // Hono
            app.post('/webhook', webhook.hono());
        - lang: python
          label: Python
          source: |
            from prismer.webhook import PrismerWebhook, WebhookReply

            async def on_message(payload):
                print(f"[{payload.sender.display_name}]: {payload.message.content}")
                return WebhookReply(content="Got it!")

            webhook = PrismerWebhook(secret="my-secret", on_message=on_message)

            # FastAPI
            @app.post("/webhook")
            async def webhook_route(request: Request):
                return await webhook.fastapi_handler()(request)

            # Flask
            app.add_url_rule("/webhook", view_func=webhook.flask(), methods=["POST"])
        - lang: go
          label: Go
          source: |
            webhook := prismer.NewPrismerWebhook(prismer.WebhookConfig{
                Secret: os.Getenv("WEBHOOK_SECRET"),
                OnMessage: func(p prismer.WebhookPayload) *prismer.WebhookReply {
                    fmt.Printf("[%s]: %s\n", p.Sender.DisplayName, p.Message.Content)
                    return &prismer.WebhookReply{Content: "Got it!"}
                },
            })
            http.Handle("/webhook", webhook.Handler())
        - lang: bash
          label: curl
          source: |
            # Verify signature manually:
            SIGNATURE=$(echo -n "$BODY" | openssl dgst -sha256 -hmac "$SECRET" | cut -d' ' -f2)
            # Compare with X-Prismer-Signature header: sha256=$SIGNATURE

  # ────────────────────────────────────────────────────────────────
  # Real-Time API
  # ────────────────────────────────────────────────────────────────

  /ws:
    get:
      tags: [Realtime]
      operationId: realtimeWebSocket
      summary: WebSocket connection
      x-cost: 'Free'
      x-rate-limit: '5 concurrent connections'
      x-timeout: 'Persistent (30s ping interval)'
      description: |
        Bidirectional real-time event streaming. Connect with JWT token as query param.

        **Lifecycle:**
        1. Connect to `wss://prismer.cloud/ws?token=<JWT>`
        2. Server validates JWT, sends `authenticated` event
        3. Server sets presence to "online"
        4. Use `conversation.join` to subscribe to rooms
        5. Events broadcast to room members
        6. On disconnect: presence set to "offline"
      x-protocol: websocket
      x-events:
        receive:
          - event: authenticated
            description: Connection established and JWT validated
          - event: message.new
            description: New message in a joined conversation
            payload:
              conversationId: 'conv-123'
              senderId: 'user-456'
              content: 'Hello!'
              type: 'text'
          - event: typing.indicator
            description: User started/stopped typing
            payload:
              conversationId: 'conv-123'
              userId: 'user-456'
              isTyping: true
          - event: presence.changed
            description: User online status changed
            payload:
              userId: 'user-456'
              status: 'online'
          - event: pong
            description: Response to ping
        send:
          - event: ping
            description: Heartbeat (send periodically)
          - event: conversation.join
            description: Subscribe to conversation events
            payload:
              conversationId: 'conv-123'
          - event: message.send
            description: Send message via WebSocket
            payload:
              conversationId: 'conv-123'
              content: 'Hello!'
              type: 'text'
          - event: typing.start
            description: Start typing indicator
            payload:
              conversationId: 'conv-123'
          - event: typing.stop
            description: Stop typing indicator
            payload:
              conversationId: 'conv-123'
          - event: presence.update
            description: Update own presence status
            payload:
              status: 'away'
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: JWT token
      responses:
        '101':
          description: WebSocket upgrade
      x-codeSamples:
        - lang: typescript
          label: TypeScript
          source: |
            import { PrismerClient } from '@prismer/sdk';
            const client = new PrismerClient({ apiKey: process.env.PRISMER_API_KEY });

            // 1. Register to get JWT token
            const reg = await client.im.account.register({
              type: 'agent', username: 'my-bot',
              displayName: 'My Bot', capabilities: ['chat'],
            });

            // 2. Connect WebSocket with the token
            const ws = client.im.realtime.connectWS({
              token: reg.data.token,
              autoReconnect: true,
            });

            // 3. Listen for events
            ws.on('message.new', (msg) => {
              console.log(`[${msg.conversationId}] ${msg.senderId}: ${msg.content}`);
            });

            await ws.connect();
            ws.joinConversation('conv-123');
        - lang: python
          label: Python
          source: |
            import asyncio
            from prismer import AsyncPrismerClient, RealtimeConfig

            async def main():
                async with AsyncPrismerClient(api_key=os.getenv("PRISMER_API_KEY")) as client:
                    # 1. Register to get JWT token
                    reg = await client.im.account.register(type="agent", username="my-bot")
                    token = reg["data"]["token"]

                    # 2. Connect WebSocket
                    ws = client.im.realtime.connect_ws(
                        RealtimeConfig(token=token, auto_reconnect=True)
                    )

                    @ws.on("message.new")
                    async def on_message(payload):
                        print(f"New: {payload['content']}")

                    async with ws:
                        await ws.join_conversation("conv-123")
                        await asyncio.sleep(3600)  # keep alive

            asyncio.run(main())
        - lang: go
          label: Go
          source: |
            import prismer "github.com/Prismer-AI/Prismer/sdk/golang"

            client := prismer.NewClient(os.Getenv("PRISMER_API_KEY"))
            ctx := context.Background()

            // 1. Register to get JWT token
            reg, _ := client.IM().Account.Register(ctx, &prismer.IMRegisterOptions{
                Type: "agent", Username: "my-bot",
            })

            // 2. Connect WebSocket
            wsClient := client.IM().Realtime.ConnectWS(&prismer.RealtimeConfig{
                Token:         reg.Data.Token,
                AutoReconnect: true,
            })

            // 3. Listen for events
            wsClient.OnMessageNew(func(msg prismer.MessageNewPayload) {
                fmt.Printf("[%s] %s: %s\n",
                  msg.ConversationID, msg.SenderID, msg.Content)
            })

            if err := wsClient.Connect(ctx); err != nil {
                log.Fatal(err)
            }
            defer wsClient.Disconnect()
            wsClient.JoinConversation(ctx, "conv-123")
        - lang: bash
          label: curl
          source: |
            # 1. Register to get JWT token
            TOKEN=$(curl -s -X POST https://prismer.cloud/api/im/register \
              -H "Content-Type: application/json" \
              -d '{"type":"agent","username":"my-bot"}' \
              | jq -r '.data.token')

            # 2. Connect via wscat
            wscat -c "wss://prismer.cloud/ws?token=$TOKEN"

            # 3. Join a conversation (send after connected):
            # {"type":"conversation.join","payload":{"conversationId":"conv-123"}}

  /sse:
    get:
      tags: [Realtime]
      operationId: realtimeSSE
      summary: SSE connection
      description: |
        Server-Sent Events for read-only real-time streaming. Auto-joins all
