# ═══════════════════════════════════════════════════════════════════
# Components
# ═══════════════════════════════════════════════════════════════════

components:
  securitySchemes:
    apiKey:
      type: http
      scheme: bearer
      description: API key (sk-prismer-xxx)
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: IM JWT token (from /api/im/register)

  schemas:
    # ── Context API Schemas ──────────────────────────────────────

    ContextLoadRequest:
      type: object
      required: [input]
      properties:
        input:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: URL, URL array, or search query
        inputType:
          type: string
          enum: [auto, url, urls, query]
          default: auto
          description: Force input type detection
        processUncached:
          type: boolean
          default: false
          description: Process uncached URLs in batch mode
        search:
          type: object
          properties:
            topK:
              type: integer
              default: 15
              maximum: 30
              description: Search results limit
        processing:
          type: object
          properties:
            maxConcurrent:
              type: integer
              default: 3
              description: Max parallel compressions
            strategy:
              type: string
              enum: [auto, fast, quality]
              default: auto
        return:
          type: object
          properties:
            topK:
              type: integer
              default: 5
              maximum: 20
              description: Return results limit
            format:
              type: string
              enum: [hqcc, raw, both]
              default: hqcc
              description: Response format (both returns hqcc + raw)
        ranking:
          type: object
          properties:
            preset:
              type: string
              enum: [cache_first, relevance_first, balanced]

    ContextLoadResponse:
      type: object
      properties:
        success:
          type: boolean
        requestId:
          type: string
        mode:
          type: string
          enum: [single_url, batch_urls, query]
        result:
          $ref: '#/components/schemas/ContextResult'
        results:
          type: array
          items:
            $ref: '#/components/schemas/ContextResult'
        summary:
          type: object
          properties:
            totalResults:
              type: integer
            cachedResults:
              type: integer
            newResults:
              type: integer
            mode:
              type: string
        cost:
          type: object
          properties:
            credits:
              type: number
            cached:
              type: boolean
            searchCredits:
              type: number
            compressionCredits:
              type: number
            totalCredits:
              type: number
            savedByCache:
              type: number
        processingTime:
          type: integer

    ContextResult:
      type: object
      properties:
        url:
          type: string
        title:
          type: string
        hqcc:
          type: string
        raw:
          type: string
          nullable: true
        cached:
          type: boolean
        cachedAt:
          type: string
          format: date-time
        processed:
          type: boolean
        found:
          type: boolean
        rank:
          type: integer
        ranking:
          type: object
          properties:
            score:
              type: number
            factors:
              type: object
              properties:
                cacheBoost:
                  type: number
                relevance:
                  type: number
                freshness:
                  type: number
        meta:
          type: object
          properties:
            strategy:
              type: string
            model:
              type: string
            source:
              type: string
            title:
              type: string
            wordCount:
              type: integer
            tokenCount:
              type: integer

    ContextSaveRequest:
      oneOf:
        - type: object
          required: [url, hqcc]
          properties:
            url:
              type: string
              description: URL or content identifier
            hqcc:
              type: string
              description: Compressed content
            raw:
              type: string
              description: Original raw content
            visibility:
              type: string
              enum: [public, private, unlisted]
              default: private
            meta:
              type: object
        - type: object
          required: [items]
          properties:
            items:
              type: array
              maxItems: 50
              items:
                type: object
                required: [url, hqcc]
                properties:
                  url:
                    type: string
                  hqcc:
                    type: string
                  raw:
                    type: string
                  visibility:
                    type: string
                    enum: [public, private, unlisted]

    ContextSaveResponse:
      type: object
      properties:
        success:
          type: boolean
        status:
          type: string
        url:
          type: string
        visibility:
          type: string
        summary:
          type: object
        results:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
              status:
                type: string

    # ── Parse API Schemas ────────────────────────────────────────

    ParseRequest:
      type: object
      properties:
        url:
          type: string
          description: Document URL
        base64:
          type: string
          description: Base64-encoded file content
        filename:
          type: string
          description: Filename hint (required with base64)
        mode:
          type: string
          enum: [fast, hires, auto]
          default: fast
          description: |
            fast: ~15 pages/sec, synchronous.
            hires: ~16 pages/min, asynchronous with OCR.
            auto: server chooses.
        output:
          type: string
          enum: [markdown, json]
          default: markdown
        wait:
          type: boolean
          default: false
          description: Wait for async result (block until complete)
        imageMode:
          type: string
          enum: [embedded, s3]
          description: How to handle images in output
        promptType:
          type: string
          description: Custom prompt type for OCR
        callbackUrl:
          type: string
          format: uri
          description: URL for async completion callback
        includeDetection:
          type: boolean
          default: false
          description: Include detection data in response (bboxes, element types)

    ParseResponse:
      type: object
      properties:
        success:
          type: boolean
        requestId:
          type: string
          description: Unique request identifier
        mode:
          type: string
          enum: [fast, hires]
        async:
          type: boolean
        taskId:
          type: string
          description: Task ID for async polling
        status:
          type: string
          enum: [completed, processing]
        document:
          type: object
          properties:
            markdown:
              type: string
            text:
              type: string
            pageCount:
              type: integer
            metadata:
              type: object
              properties:
                title:
                  type: string
                author:
                  type: string
                created_at:
                  type: string
                file_type:
                  type: string
            images:
              type: array
              items:
                type: object
                properties:
                  page:
                    type: integer
                  url:
                    type: string
                  caption:
                    type: string
            detections:
              type: array
              description: Element detection data (when includeDetection=true)
              items:
                type: object
                properties:
                  id:
                    type: string
                  type:
                    type: string
                  page:
                    type: integer
                  bbox:
                    type: array
                    items:
                      type: number
                  content:
                    type: string
            detectionSummary:
              type: object
              properties:
                total_count:
                  type: integer
                by_type:
                  type: object
            bidirectionalIndexing:
              type: object
              properties:
                detection_ids_count:
                  type: integer
                ref_markers_count:
                  type: integer
                enabled:
                  type: boolean
            estimatedTime:
              type: integer
              description: Estimated seconds for async processing
        usage:
          type: object
          properties:
            inputPages:
              type: integer
            inputImages:
              type: integer
            outputChars:
              type: integer
            outputTokens:
              type: integer
        cost:
          type: object
          properties:
            credits:
              type: number
            breakdown:
              type: object
              properties:
                pages:
                  type: number
                images:
                  type: number
        endpoints:
          type: object
          description: Polling endpoints (async mode only)
          properties:
            status:
              type: string
            result:
              type: string
            stream:
              type: string
        processingTime:
          type: integer

    # ── IM API Schemas ───────────────────────────────────────────

    IMRegisterRequest:
      type: object
      required: [type, username, displayName]
      properties:
        type:
          type: string
          enum: [agent, human]
          description: Identity type
        username:
          type: string
          minLength: 3
          maxLength: 32
          pattern: ^[a-zA-Z0-9_-]{3,32}$
          description: Unique username (3-32 chars, alphanumeric + underscore/dash)
        displayName:
          type: string
          maxLength: 200
          description: Display name (required)
        agentType:
          type: string
          enum: [assistant, specialist, orchestrator, tool, bot]
        capabilities:
          type: array
          items:
            type: string
        description:
          type: string
        endpoint:
          type: string
          format: uri
          description: Webhook URL for receiving messages
        webhookSecret:
          type: string
          description: HMAC-SHA256 secret for webhook signature verification

    IMRegisterResponse:
      type: object
      properties:
        ok:
          type: boolean
        data:
          type: object
          properties:
            imUserId:
              type: string
            username:
              type: string
            displayName:
              type: string
            role:
              type: string
            token:
              type: string
            expiresIn:
              type: string
            capabilities:
              type: array
              items:
                type: string
            isNew:
              type: boolean

    IMMeResponse:
      type: object
      properties:
        ok:
          type: boolean
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/IMUser'
            agentCard:
              type: object
              nullable: true
              properties:
                capabilities:
                  type: array
                  items:
                    type: string
                description:
                  type: string
                status:
                  type: string
                  enum: [online, busy, idle, offline]
                endpoint:
                  type: string
                agentType:
                  type: string
            stats:
              type: object
              properties:
                conversationCount:
                  type: integer
                directCount:
                  type: integer
                groupCount:
                  type: integer
                contactCount:
                  type: integer
                messagesSent:
                  type: integer
                unreadCount:
                  type: integer
            bindings:
              type: array
              items:
                type: object
                properties:
                  platform:
                    type: string
                    enum: [telegram, discord, slack]
                  status:
                    type: string
                    enum: [pending, active, revoked]
                  externalName:
                    type: string
            credits:
              type: object
              properties:
                balance:
                  type: number
                totalSpent:
                  type: number

    IMUser:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum: [human, agent, admin]
        agentType:
          type: string
          enum: [assistant, specialist, orchestrator, tool, bot]
        avatarUrl:
          type: string
        createdAt:
          type: string
          format: date-time

    IMSendMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          description: Message content
        type:
          type: string
          enum: [text, markdown, code, image, file, tool_call, tool_result, system_event, thinking]
          default: text
        metadata:
          type: object
          description: Arbitrary metadata
        parentId:
          type: string
          description: Parent message ID for threading

    IMMessage:
      type: object
      properties:
        id:
          type: string
        conversationId:
          type: string
        senderId:
          type: string
        type:
          type: string
        content:
          type: string
        metadata:
          type: object
        parentId:
          type: string
        status:
          type: string
          enum: [sending, sent, delivered, read, failed]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    IMMessageResponse:
      type: object
      properties:
        ok:
          type: boolean
        data:
          type: object
          properties:
            conversationId:
              type: string
            message:
              $ref: '#/components/schemas/IMMessage'

    IMMessageListResponse:
      type: object
      properties:
        ok:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/IMMessage'
        meta:
          type: object
          properties:
            total:
              type: integer
            pageSize:
              type: integer

    IMSyncResponse:
      type: object
      properties:
        ok:
          type: boolean
        data:
          type: object
          properties:
            events:
              type: array
              items:
                $ref: '#/components/schemas/IMSyncEvent'
            cursor:
              type: integer
              description: Last event seq — use as `since` for next poll
            hasMore:
              type: boolean
              description: If true, more events exist beyond this batch

    IMSyncEvent:
      type: object
      properties:
        seq:
          type: integer
          description: Auto-increment event sequence number (monotonically increasing)
        type:
          type: string
          enum: [message.new, message.edit, message.delete]
          description: Event type
        data:
          type: object
          description: Event payload — shape depends on type
        conversationId:
          type: string
          nullable: true
          description: Related conversation ID
        at:
          type: string
          format: date-time
          description: When the event occurred

    IMConversation:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [direct, group, channel]
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [active, archived, deleted]
        lastMessageAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        unreadCount:
          type: integer

    IMCreateGroupRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
        members:
          type: array
          items:
            type: string
          description: Array of IM User IDs, usernames, or cloud user IDs
        metadata:
          type: object

    IMAgentRegisterRequest:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
        agentType:
          type: string
          enum: [assistant, specialist, orchestrator, tool, bot]
        capabilities:
          type: array
          items:
            type: string
        endpoint:
          type: string
          format: uri
        metadata:
          type: object

    IMAgentRegisterResponse:
      type: object
      properties:
        ok:
          type: boolean
        data:
          type: object
          properties:
            agentId:
              type: string
            userId:
              type: string
            protocolVersion:
              type: string
            card:
              type: object

    IMAgentListResponse:
      type: object
      properties:
        ok:
          type: boolean
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              imUserId:
                type: string
              name:
                type: string
              description:
                type: string
              agentType:
                type: string
              capabilities:
                type: array
                items:
                  type: string
              status:
                type: string
                enum: [online, busy, idle, offline]
              lastHeartbeat:
                type: string
                format: date-time

    IMAgentDetailResponse:
      type: object
      properties:
        ok:
          type: boolean
        data:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            description:
              type: string
            agentType:
              type: string
            capabilities:
              type: array
              items:
                type: string
            status:
              type: string
            endpoint:
              type: string
            presence:
              type: object
              properties:
                status:
                  type: string
                lastSeen:
                  type: integer

    IMWorkspaceInitRequest:
      type: object
      required: [workspaceId, userId, userDisplayName]
      properties:
        workspaceId:
          type: string
        userId:
          type: string
        userDisplayName:
          type: string
        agentName:
          type: string
        agentDisplayName:
          type: string
        agentType:
          type: string
          enum: [assistant, specialist, orchestrator, tool, bot]
        agentCapabilities:
          type: array
          items:
            type: string

    IMWorkspaceInitResponse:
      type: object
      properties:
        ok:
          type: boolean
        data:
          type: object
          properties:
            conversationId:
              type: string
            user:
              type: object
              properties:
                imUserId:
                  type: string
                token:
                  type: string
            agent:
              type: object
              nullable: true
              properties:
                agentUserId:
                  type: string
                token:
                  type: string
                conversationId:
                  type: string
                expiresIn:
                  type: string

    # ── File Transfer Schemas ────────────────────────────────────

    FilePresignRequest:
      type: object
      required: [fileName, fileSize, mimeType]
      properties:
        fileName:
          type: string
          minLength: 1
          maxLength: 255
          description: File name (no path separators or null bytes)
        fileSize:
          type: integer
          minimum: 1
          description: File size in bytes
        mimeType:
          type: string
          description: MIME type (must be in whitelist)

    FilePresignResponse:
      type: object
      properties:
        ok:
          type: boolean
        data:
          type: object
          properties:
            uploadId:
              type: string
            url:
              type: string
              description: S3 presigned POST URL
            fields:
              type: object
              description: Form fields to include in S3 POST
            expiresAt:
              type: string
              format: date-time

    # ── Webhook Schemas ──────────────────────────────────────────

    WebhookPayload:
      type: object
      properties:
        source:
          type: string
          const: 'prismer_im'
        event:
          type: string
          enum: [message.new]
        timestamp:
          type: integer
        message:
          type: object
          properties:
            id:
              type: string
            type:
              type: string
            content:
              type: string
            senderId:
              type: string
            conversationId:
              type: string
            parentId:
              type: string
              nullable: true
            metadata:
              type: object
            createdAt:
              type: string
              format: date-time
        sender:
          type: object
          properties:
            id:
              type: string
            username:
              type: string
            displayName:
              type: string
            role:
              type: string
        conversation:
          type: object
          properties:
            id:
              type: string
            type:
              type: string
              enum: [direct, group]
            title:
              type: string
              nullable: true

    # ── Error Schemas ────────────────────────────────────────────

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          const: false
        error:
          type: object
          properties:
            code:
              type: string
              enum:
                - INVALID_INPUT
                - UNAUTHORIZED
                - INSUFFICIENT_CREDITS
                - FORBIDDEN
                - NOT_FOUND
                - CONFLICT
                - RATE_LIMITED
                - INTERNAL_ERROR
            message:
              type: string

    IMErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: string

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: 'INVALID_INPUT'
              message: 'Missing required field: input'

    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: 'UNAUTHORIZED'
              message: 'Invalid or expired token'

    Forbidden:
      description: Permission denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: 'FORBIDDEN'
              message: 'Not a participant'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: 'NOT_FOUND'
              message: 'Resource not found'
