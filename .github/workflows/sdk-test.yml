name: SDK Tests

on:
  push:
    branches: [main]
    paths:
      - "sdk/**"
  pull_request:
    branches: [main]
    paths:
      - "sdk/**"

concurrency:
  group: sdk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - run: npm test

  python:
    name: Python SDK
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest

  golang:
    name: Go SDK
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: sdk/golang
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: sdk/golang/go.mod
      - run: go build ./...
      - run: go test ./...

  mcp:
    name: MCP Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
