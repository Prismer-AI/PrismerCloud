name: CI

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/ci.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run prisma:generate:all
      - run: npm run check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run prisma:generate:all
      - run: npm run build
        env:
          NACOS_DISABLED: "true"
