openapi: 3.1.0
info:
  title: Prismer IM Server API
  description: |
    Prismer IM (Instant Messaging) Server API 提供人机、机机通信的完整解决方案。

    ## 核心功能
    - **用户管理**: 支持 Human 和 Agent 两种用户类型
    - **对话管理**: 支持 1:1 (direct) 和群组 (group) 对话
    - **消息系统**: 支持多种消息类型 (text, markdown, code, tool_call 等)
    - **Agent 协议**: 支持 Agent 注册、发现、心跳
    - **实时通信**: WebSocket 支持消息推送、流式输出、typing 指示器

    ## 认证方式
    所有 API (除注册和登录外) 都需要在 Header 中携带 JWT Token:
    ```
    Authorization: Bearer <token>
    ```

    ## WebSocket 连接
    WebSocket 端点: `ws://<host>:3200/ws`

    连接方式:
    1. Query 参数: `ws://<host>:3200/ws?token=<jwt_token>`
    2. 连接后发送 authenticate 事件

  version: 1.7.0
  contact:
    name: Prismer Cloud Team
  license:
    name: Proprietary

servers:
  - url: http://localhost:3200/api
    description: Local development

tags:
  - name: Health
    description: 服务健康检查
  - name: Users
    description: 用户注册、登录、个人信息管理
  - name: Conversations
    description: 对话的创建、查询、更新
  - name: Messages
    description: 消息的发送、查询、编辑 (含 @提及解析)
  - name: Agents
    description: Agent 注册、发现、心跳
  - name: Workspace
    description: Workspace-IM 集成 (初始化、Agent 管理、Token 生成)
  - name: Sync
    description: 离线优先 SDK 的增量同步 API（游标分页 + SSE 实时推送）
  - name: WebSocket
    description: WebSocket 实时通信协议

paths:
  /health:
    get:
      tags: [Health]
      summary: 健康检查
      description: 返回服务状态和统计信息
      operationId: healthCheck
      responses:
        '200':
          description: 服务正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  service:
                    type: string
                    example: prismer-im-server
                  version:
                    type: string
                    example: "0.1.0"
                  timestamp:
                    type: string
                    format: date-time
                  stats:
                    type: object
                    properties:
                      totalConnections:
                        type: integer
                      rooms:
                        type: integer

  # ─── Users API ─────────────────────────────────────────────────

  /users/register:
    post:
      tags: [Users]
      summary: 注册用户
      description: |
        注册新的 IM 用户。支持两种角色:
        - `human`: 人类用户
        - `agent`: AI Agent 用户 (需指定 agentType)
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegisterRequest'
            examples:
              humanUser:
                summary: 注册人类用户
                value:
                  username: john_doe
                  displayName: John Doe
                  password: secure123
                  role: human
              agentUser:
                summary: 注册 Agent 用户
                value:
                  username: code-assistant
                  displayName: Code Assistant
                  role: agent
                  agentType: assistant
                  metadata:
                    model: gpt-4
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: 用户名已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/login:
    post:
      tags: [Users]
      summary: 用户登录
      description: 使用用户名和密码登录，获取 JWT Token
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username:
                  type: string
                  description: 用户名
                password:
                  type: string
                  description: 密码 (如果设置了的话)
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: 认证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me:
    get:
      tags: [Users]
      summary: 获取当前用户信息
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Users]
      summary: 更新当前用户信息
      operationId: updateCurrentUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                avatarUrl:
                  type: string
                  format: uri
                metadata:
                  type: object
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/{id}:
    get:
      tags: [Users]
      summary: 获取指定用户信息
      operationId: getUserById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: 用户 ID
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── Conversations API ─────────────────────────────────────────

  /conversations:
    get:
      tags: [Conversations]
      summary: 获取当前用户的对话列表
      operationId: listConversations
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived, deleted]
            default: active
          description: 过滤对话状态
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /conversations/direct:
    post:
      tags: [Conversations]
      summary: 创建 1:1 对话
      description: 与另一个用户创建直接对话
      operationId: createDirectConversation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [otherUserId]
              properties:
                otherUserId:
                  type: string
                  description: 对方用户 ID
                metadata:
                  type: object
                  description: 自定义元数据
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /conversations/group:
    post:
      tags: [Conversations]
      summary: 创建群组对话
      operationId: createGroupConversation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  description: 群组名称
                description:
                  type: string
                  description: 群组描述
                memberIds:
                  type: array
                  items:
                    type: string
                  description: 初始成员 ID 列表
                metadata:
                  type: object
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /conversations/{id}:
    get:
      tags: [Conversations]
      summary: 获取对话详情
      operationId: getConversation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Conversations]
      summary: 更新对话
      operationId: updateConversation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                metadata:
                  type: object
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /conversations/{id}/archive:
    post:
      tags: [Conversations]
      summary: 归档对话
      operationId: archiveConversation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 归档成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /conversations/{id}/participants:
    post:
      tags: [Conversations]
      summary: 添加参与者
      operationId: addParticipant
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: string
                  description: 要添加的用户 ID
                role:
                  type: string
                  enum: [owner, admin, member, observer]
                  default: member
      responses:
        '201':
          description: 添加成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /conversations/{id}/participants/{userId}:
    delete:
      tags: [Conversations]
      summary: 移除参与者
      operationId: removeParticipant
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 移除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── Messages API ──────────────────────────────────────────────

  /messages/{conversationId}:
    get:
      tags: [Messages]
      summary: 获取消息历史
      description: 使用游标分页获取对话中的消息
      operationId: getMessages
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
        - name: before
          in: query
          schema:
            type: string
          description: 获取此消息 ID 之前的消息
        - name: after
          in: query
          schema:
            type: string
          description: 获取此消息 ID 之后的消息
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
          description: 每页数量
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Messages]
      summary: 发送消息
      description: |
        通过 REST API 发送消息。支持多种消息类型:
        - `text`: 纯文本
        - `markdown`: Markdown 格式
        - `code`: 代码块 (需指定 metadata.language)
        - `image/file`: 文件 (需指定 metadata.fileUrl 等)
        - `tool_call`: Agent 工具调用
        - `tool_result`: 工具调用结果
        - `thinking`: Agent 思考过程
      operationId: sendMessage
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
            examples:
              textMessage:
                summary: 发送文本消息
                value:
                  type: text
                  content: Hello, world!
              codeMessage:
                summary: 发送代码
                value:
                  type: code
                  content: |
                    function hello() {
                      console.log("Hello!");
                    }
                  metadata:
                    language: javascript
              toolCall:
                summary: Agent 工具调用
                value:
                  type: tool_call
                  content: ""
                  metadata:
                    toolCall:
                      callId: call_abc123
                      toolName: search_web
                      arguments:
                        query: "weather in Beijing"
      responses:
        '201':
          description: 发送成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /messages/{conversationId}/{messageId}:
    patch:
      tags: [Messages]
      summary: 编辑消息
      description: 只能编辑自己发送的消息
      operationId: updateMessage
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                metadata:
                  type: object
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Messages]
      summary: 删除消息
      description: 只能删除自己发送的消息
      operationId: deleteMessage
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── Agents API ────────────────────────────────────────────────

  /agents:
    get:
      tags: [Agents]
      summary: 发现 Agents
      description: 根据条件查询可用的 Agents
      operationId: discoverAgents
      security:
        - bearerAuth: []
      parameters:
        - name: agentType
          in: query
          schema:
            $ref: '#/components/schemas/AgentType'
          description: 按 Agent 类型过滤
        - name: capability
          in: query
          schema:
            type: string
          description: 按能力名称过滤
        - name: onlineOnly
          in: query
          schema:
            type: boolean
            default: false
          description: 只返回在线的 Agents
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /agents/register:
    post:
      tags: [Agents]
      summary: 注册 Agent
      description: |
        注册 Agent 能力卡片。需要先以 agent 角色注册用户，然后使用该用户的 Token 调用此接口。

        注册后 Agent 可以:
        - 被其他用户/Agent 发现
        - 接收工具调用请求
        - 参与对话
      operationId: registerAgent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentRegisterRequest'
            example:
              name: Code Assistant
              description: A helpful coding assistant powered by GPT-4
              agentType: assistant
              capabilities:
                - name: code_review
                  description: Review code for bugs and improvements
                  inputSchema:
                    type: object
                    properties:
                      code:
                        type: string
                      language:
                        type: string
                - name: code_generation
                  description: Generate code from natural language
              endpoint: https://my-agent.example.com/api/invoke
              metadata:
                model: gpt-4
                version: "1.0"
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRegisterResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 只有 agent 角色的用户可以注册
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /agents/{userId}:
    get:
      tags: [Agents]
      summary: 获取 Agent 详情
      operationId: getAgent
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: Agent 的用户 ID
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Agents]
      summary: 注销 Agent
      description: 只能注销自己的 Agent (admin 可以注销任何)
      operationId: unregisterAgent
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 注销成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /agents/{userId}/heartbeat:
    post:
      tags: [Agents]
      summary: Agent 心跳
      description: |
        Agent 定期发送心跳以报告状态。建议每 30 秒发送一次。

        超过 5 分钟未发送心跳的 Agent 会被标记为 offline。
      operationId: agentHeartbeat
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  $ref: '#/components/schemas/AgentStatus'
                load:
                  type: number
                  minimum: 0
                  maximum: 1
                  description: 当前负载 (0-1)
                activeConversations:
                  type: integer
                  description: 当前活跃对话数
            example:
              status: online
              load: 0.3
              activeConversations: 2
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: 只能发送自己的心跳
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /agents/discover/{capability}:
    get:
      tags: [Agents]
      summary: 按能力发现最佳 Agent
      description: 根据能力名称找到最合适的 Agent (考虑在线状态和负载)
      operationId: findBestAgent
      security:
        - bearerAuth: []
      parameters:
        - name: capability
          in: path
          required: true
          schema:
            type: string
          description: 能力名称
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 没有找到具有该能力的 Agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─── Workspace API ─────────────────────────────────────────────

  /workspace/init:
    post:
      tags: [Workspace]
      summary: 初始化 Workspace
      description: |
        为 Workspace 创建 IM 会话，并可选地创建关联的 Agent。
        返回用户和 Agent 的 JWT Token，用于后续通信。
      operationId: initWorkspace
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspaceId, userId, userDisplayName]
              properties:
                workspaceId:
                  type: string
                  description: Workspace 唯一标识
                userId:
                  type: string
                  description: 主应用 User ID
                userDisplayName:
                  type: string
                  description: 用户显示名称
                agentName:
                  type: string
                  description: Agent 用户名 (可选)
                agentDisplayName:
                  type: string
                  description: Agent 显示名称
                agentType:
                  $ref: '#/components/schemas/AgentType'
                agentCapabilities:
                  type: array
                  items:
                    type: string
                  description: Agent 能力列表
            example:
              workspaceId: ws-001
              userId: user-123
              userDisplayName: Alice
              agentName: research-agent
              agentDisplayName: Research Agent
              agentType: assistant
              agentCapabilities: [paper_search, code_review]
      responses:
        '201':
