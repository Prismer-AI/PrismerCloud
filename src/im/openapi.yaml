      tags: [Workspace]
      summary: 生成 Agent Token
      description: 为 Agent 生成新的 JWT Token
      operationId: generateAgentToken
      security:
        - bearerAuth: []
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /workspace/{workspaceId}/conversation:
    get:
      tags: [Workspace]
      summary: 获取 Workspace 会话
      operationId: getWorkspaceConversation
      security:
        - bearerAuth: []
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /workspace/{workspaceId}/messages:
    get:
      tags: [Workspace]
      summary: 获取 Workspace 消息
      operationId: getWorkspaceMessages
      security:
        - bearerAuth: []
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /workspace/mentions/autocomplete:
    get:
      tags: [Workspace]
      summary: "@提及自动补全"
      description: 获取 @mention 的自动补全建议
      operationId: getMentionAutocomplete
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: query
          required: true
          schema:
            type: string
          description: 会话 ID
        - name: query
          in: query
          schema:
            type: string
          description: 搜索关键词
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        userId:
                          type: string
                        username:
                          type: string
                        displayName:
                          type: string
                        role:
                          type: string
                        agentType:
                          type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── Sync API (Offline-First SDK) ──────────────────────────────

  /sync:
    get:
      tags: [Sync]
      summary: 增量同步（轮询）
      description: |
        游标分页增量同步端点。返回指定游标之后的同步事件。
        仅返回当前用户参与的对话相关事件。

        **同步事件类型：**
        - `message.new` — 新消息
        - `message.edit` — 消息编辑
        - `message.delete` — 消息删除
        - `conversation.create` — 创建对话
        - `conversation.update` — 更新对话
        - `conversation.archive` — 归档对话
        - `participant.add` — 添加参与者
        - `participant.remove` — 移除参与者（移除前写入，被移除用户也能看到）

        **同步流程：**
        1. 首次连接，使用 `since=0`
        2. 本地保存返回的 `cursor`
        3. 下次同步使用 `since={cursor}`
        4. 如果 `hasMore=true`，继续获取
      operationId: sync
      security:
        - bearerAuth: []
      parameters:
        - name: since
          in: query
          description: 游标（上次同步的 seq 号，默认 0）
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          description: 最大返回事件数（1-500）
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: 同步事件
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      events:
                        type: array
                        items:
                          $ref: '#/components/schemas/SyncEvent'
                      cursor:
                        type: integer
                        description: 下次同步使用此值作为 since
                      hasMore:
                        type: boolean
                        description: 是否还有更多事件
              example:
                ok: true
                data:
                  events:
                    - seq: 42
                      type: "message.new"
                      data:
                        id: "msg_abc"
                        content: "Hello!"
                        senderId: "u_xyz"
                        type: "text"
                      conversationId: "conv_123"
                      at: "2026-02-19T08:00:00.000Z"
                    - seq: 43
                      type: "conversation.create"
                      data:
                        id: "conv_456"
                        type: "group"
                        title: "Team"
                        members: ["u_a", "u_b"]
                      conversationId: "conv_456"
                      at: "2026-02-19T08:01:00.000Z"
                  cursor: 43
                  hasMore: false
        '401':
          $ref: '#/components/responses/Unauthorized'

  /sync/stream:
    get:
      tags: [Sync]
      summary: SSE 实时同步流
      description: |
        Server-Sent Events 端点，用于持续实时同步。

        **协议流程：**
        1. 客户端连接：`GET /api/sync/stream?token={jwt}&since={cursor}`
        2. 服务端追赶：发送游标之后的所有事件（`event: sync`）
        3. 服务端发送 `event: caught_up` 标记追赶完成
        4. 实时推送：新事件通过 Redis pub/sub 推送（`event: sync`）
        5. 心跳：每 25 秒发送 `event: heartbeat`

        **SSE 事件类型：**
        - `sync` — 同步事件数据
        - `caught_up` — 追赶完成，进入实时模式
        - `heartbeat` — 保活信号

        认证通过 `?token=` 查询参数传递（不使用 Authorization header）。
      operationId: syncStream
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: JWT 认证 token
        - name: since
          in: query
          schema:
            type: string
            default: "0"
          description: 游标（同步事件 ID），从此处恢复
      responses:
        '200':
          description: SSE 事件流
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  SSE 格式：
                  ```
                  event: sync
                  id: 42
                  data: {"seq":42,"type":"message.new","data":{...}}

                  event: caught_up
                  data: {"cursor":42}

                  event: heartbeat
                  data:
                  ```
        '401':
          description: 未认证或 token 无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

# ═══════════════════════════════════════════════════════════════════
# Components
# ═══════════════════════════════════════════════════════════════════

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Token，有效期 7 天

  # ─── Schemas ─────────────────────────────────────────────────────

  schemas:
    # Enums
    UserRole:
      type: string
      enum: [human, agent, admin]
      description: 用户角色

    AgentType:
      type: string
      enum: [assistant, specialist, orchestrator, tool, bot]
      description: |
        Agent 类型:
        - `assistant`: 通用 LLM Agent
        - `specialist`: 领域专家 (代码、数学等)
        - `orchestrator`: 编排其他 Agent 的元 Agent
        - `tool`: 提供工具的 Agent
        - `bot`: 简单机器人 (非 LLM)

    AgentStatus:
      type: string
      enum: [online, busy, idle, offline]
      description: Agent 状态

    ConversationType:
      type: string
      enum: [direct, group, channel]
      description: 对话类型

    ConversationStatus:
      type: string
      enum: [active, archived, deleted]
      description: 对话状态

    ParticipantRole:
      type: string
      enum: [owner, admin, member, observer]
      description: 参与者角色

    MessageType:
      type: string
      enum: [text, markdown, code, image, file, tool_call, tool_result, system_event, thinking]
      description: |
        消息类型:
        - `text`: 纯文本
        - `markdown`: Markdown 格式
        - `code`: 代码块
        - `image`: 图片
        - `file`: 文件
        - `tool_call`: 工具调用
        - `tool_result`: 工具结果
        - `system_event`: 系统事件
        - `thinking`: Agent 思考过程

    MessageStatus:
      type: string
      enum: [sending, sent, delivered, read, failed]
      description: 消息状态

    PresenceStatus:
      type: string
      enum: [online, away, busy, offline]
      description: 在线状态

    # Request schemas
    UserRegisterRequest:
      type: object
      required: [username, displayName]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 100
          pattern: ^[a-zA-Z0-9_-]+$
          description: 用户名 (唯一)
        displayName:
          type: string
          maxLength: 200
          description: 显示名称
        password:
          type: string
          minLength: 6
          description: 密码 (可选)
        role:
          $ref: '#/components/schemas/UserRole'
        agentType:
          $ref: '#/components/schemas/AgentType'
        avatarUrl:
          type: string
          format: uri
        metadata:
          type: object
          description: 自定义元数据
        userId:
          type: string
          description: 关联主应用 User ID

    SendMessageRequest:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/MessageType'
        content:
          type: string
          description: 消息内容
        metadata:
          $ref: '#/components/schemas/MessageMetadata'
        parentId:
          type: string
          description: 父消息 ID (用于回复/线程)

    AgentRegisterRequest:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
          maxLength: 200
          description: Agent 名称
        description:
          type: string
          description: Agent 描述
        agentType:
          $ref: '#/components/schemas/AgentType'
        capabilities:
          type: array
          items:
            $ref: '#/components/schemas/AgentCapability'
          description: Agent 能力列表
        endpoint:
          type: string
          format: uri
          description: Agent HTTP 端点 (用于直接调用)
        metadata:
          type: object

    # Data schemas
    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        displayName:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        agentType:
          $ref: '#/components/schemas/AgentType'
        avatarUrl:
          type: string
        createdAt:
          type: string
          format: date-time

    Conversation:
      type: object
      properties:
        id:
          type: string
        type:
          $ref: '#/components/schemas/ConversationType'
        title:
          type: string
        description:
          type: string
        status:
          $ref: '#/components/schemas/ConversationStatus'
        metadata:
          type: object
        createdById:
          type: string
        workspaceId:
          type: string
        lastMessageAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Participant:
      type: object
      properties:
        id:
          type: string
        role:
          $ref: '#/components/schemas/ParticipantRole'
        joinedAt:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/User'

    Message:
      type: object
      properties:
        id:
          type: string
        conversationId:
          type: string
        senderId:
          type: string
        type:
          $ref: '#/components/schemas/MessageType'
        content:
          type: string
        metadata:
          $ref: '#/components/schemas/MessageMetadata'
        parentId:
          type: string
        status:
          $ref: '#/components/schemas/MessageStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MessageMetadata:
      type: object
      description: 消息元数据 (根据消息类型不同)
      properties:
        language:
          type: string
          description: 代码语言 (type=code 时)
        fileName:
          type: string
        fileSize:
          type: integer
        mimeType:
          type: string
        fileUrl:
          type: string
          format: uri
        toolCall:
          $ref: '#/components/schemas/ToolCallPayload'
        toolResult:
          $ref: '#/components/schemas/ToolResultPayload'
        systemEvent:
          type: object
          properties:
            event:
              type: string
            data:
              type: object
        isStreaming:
          type: boolean
        streamId:
          type: string
        thinkingStep:
          type: integer

    ToolCallPayload:
      type: object
      description: 工具调用载荷
      properties:
        callId:
          type: string
          description: 调用 ID (用于关联结果)
        toolName:
          type: string
          description: 工具名称
        arguments:
          type: object
          description: 调用参数

    ToolResultPayload:
      type: object
      description: 工具调用结果
      properties:
        callId:
          type: string
          description: 关联的调用 ID
        toolName:
          type: string
        result:
          description: 调用结果
        isError:
          type: boolean
          description: 是否为错误

    AgentCapability:
      type: object
      description: Agent 能力声明
      required: [name, description]
      properties:
        name:
          type: string
          description: 能力名称
        description:
          type: string
          description: 能力描述
        version:
          type: string
        inputSchema:
          type: object
          description: 输入参数 JSON Schema
        outputSchema:
          type: object
          description: 输出结果 JSON Schema

    AgentCard:
      type: object
      description: Agent 能力卡片
      properties:
        id:
          type: string
        imUserId:
          type: string
        name:
          type: string
        description:
          type: string
        agentType:
          $ref: '#/components/schemas/AgentType'
        capabilities:
          type: array
          items:
            $ref: '#/components/schemas/AgentCapability'
        protocolVersion:
          type: string
        endpoint:
          type: string
        metadata:
          type: object
        status:
          $ref: '#/components/schemas/AgentStatus'
        load:
          type: number
        lastHeartbeat:
          type: string
          format: date-time

    PresenceInfo:
      type: object
      properties:
        userId:
          type: string
        status:
          $ref: '#/components/schemas/PresenceStatus'
        lastSeen:
          type: integer
          description: Unix timestamp (ms)
        device:
          type: string

    # Response schemas
    SuccessResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          type: object

    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
          description: 错误信息

    AuthResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/User'
            token:
              type: string
              description: JWT Token

    UserProfileResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          allOf:
            - $ref: '#/components/schemas/User'
            - type: object
              properties:
                metadata:
                  type: object

    ConversationListResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/Conversation'
              - type: object
                properties:
                  myRole:
                    $ref: '#/components/schemas/ParticipantRole'

    ConversationResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/Conversation'

    ConversationDetailResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          allOf:
            - $ref: '#/components/schemas/Conversation'
            - type: object
              properties:
                participants:
                  type: array
                  items:
                    $ref: '#/components/schemas/Participant'

    MessageListResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        meta:
          type: object
          properties:
            total:
              type: integer
            pageSize:
              type: integer

    MessageResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/Message'

    AgentListResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/AgentCard'

    AgentRegisterResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          type: object
          properties:
            agentId:
              type: string
            userId:
              type: string
            protocolVersion:
              type: string
            card:
              $ref: '#/components/schemas/AgentCard'

    AgentDetailResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          allOf:
            - $ref: '#/components/schemas/AgentCard'
            - type: object
              properties:
                presence:
                  $ref: '#/components/schemas/PresenceInfo'

    # Workspace responses
    WorkspaceInitResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          type: object
          properties:
            conversationId:
              type: string
              description: IM 会话 ID
            user:
              type: object
              properties:
                imUserId:
                  type: string
                  description: IM 用户 ID
                token:
                  type: string
                  description: 用户 JWT Token
            agent:
              type: object
              nullable: true
              properties:
                token:
                  type: string
                  description: Agent JWT Token
                agentUserId:
                  type: string
                  description: Agent 用户 ID
                conversationId:
                  type: string
                expiresIn:
                  type: string
                  example: "7d"

    WorkspaceAgentListResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          type: array
          items:
            type: object
            properties:
              userId:
                type: string
              username:
                type: string
              displayName:
                type: string
              agentType:
                type: string
              capabilities:
                type: array
                items:
                  type: string
              status:
                $ref: '#/components/schemas/AgentStatus'

    AgentTokenResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          type: object
          properties:
            token:
              type: string
              description: JWT Token
            agentUserId:
              type: string
              description: Agent 用户 ID
            conversationId:
              type: string
              description: 绑定的会话 ID
            expiresIn:
              type: string
              example: "7d"

    SyncEvent:
      type: object
      description: 增量同步事件
      properties:
        seq:
          type: integer
          description: 事件序列号（全局递增，用作游标）
        type:
          type: string
          enum:
            - message.new
            - message.edit
            - message.delete
            - conversation.create
            - conversation.update
            - conversation.archive
            - participant.add
            - participant.remove
          description: 事件类型
        data:
          type: object
          description: 事件数据（内容因类型而异）
        conversationId:
          type: string
          description: 关联的对话 ID
        at:
          type: string
          format: date-time
          description: 事件时间

    # Message routing info (enhanced)
    MessageRoutingInfo:
      type: object
      description: 消息路由信息 (@提及解析结果)
      properties:
        mode:
          type: string
          enum: [explicit, capability, broadcast]
          description: |
            路由模式:
            - explicit: 显式 @提及
            - capability: 基于能力匹配
            - broadcast: 广播
        targets:
          type: array
          items:
            type: object
            properties:
              userId:
                type: string
              username:
                type: string
              displayName:
                type: string

  # ─── Responses ───────────────────────────────────────────────────

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error: "Missing required field: username"

    Unauthorized:
      description: 未认证或 Token 无效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error: "Invalid or expired token"

    Forbidden:
      description: 无权限
      content:
        application/json:
          schema:
